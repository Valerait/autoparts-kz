<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <rect width="120" height="120" rx="16" fill="#FFF7ED"/>
  <!-- Filter housing outer -->
  <rect x="18" y="32" width="84" height="56" rx="10" fill="#F97316" opacity="0.15"/>
  <rect x="18" y="32" width="84" height="56" rx="10" stroke="#F97316" stroke-width="2"/>
  <!-- Filter media (wavy/pleated look) -->
  <rect x="24" y="38" width="72" height="44" rx="6" fill="url(#airGrad)"/>
  <!-- Pleats -->
  <rect x="32" y="38" width="4" height="44" rx="0" fill="#EA580C" opacity="0.25"/>
  <rect x="40" y="38" width="4" height="44" rx="0" fill="#EA580C" opacity="0.25"/>
  <rect x="48" y="38" width="4" height="44" rx="0" fill="#EA580C" opacity="0.25"/>
  <rect x="56" y="38" width="4" height="44" rx="0" fill="#EA580C" opacity="0.25"/>
  <rect x="64" y="38" width="4" height="44" rx="0" fill="#EA580C" opacity="0.25"/>
  <rect x="72" y="38" width="4" height="44" rx="0" fill="#EA580C" opacity="0.25"/>
  <rect x="80" y="38" width="4" height="44" rx="0" fill="#EA580C" opacity="0.25"/>
  <!-- Gasket ring top and bottom -->
  <rect x="18" y="32" width="84" height="8" rx="4" fill="#C2410C"/>
  <rect x="18" y="80" width="84" height="8" rx="4" fill="#C2410C"/>
  <!-- Air flow arrows -->
  <path d="M52 56 L60 52 L68 56" stroke="white" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.6"/>
  <path d="M52 64 L60 60 L68 64" stroke="white" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.4"/>
  <defs>
    <linearGradient id="airGrad" x1="24" y1="38" x2="96" y2="82" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FB923C"/>
      <stop offset="1" stop-color="#EA580C"/>
    </linearGradient>
  </defs>
</svg>
