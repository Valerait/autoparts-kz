<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <rect width="120" height="120" rx="16" fill="#FFF1F2"/>
  <!-- Brake disc -->
  <circle cx="60" cy="60" r="32" fill="#E5E7EB"/>
  <circle cx="60" cy="60" r="32" stroke="#9CA3AF" stroke-width="2"/>
  <!-- Disc vents -->
  <circle cx="60" cy="60" r="18" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1.5"/>
  <circle cx="60" cy="60" r="8" fill="#9CA3AF"/>
  <circle cx="60" cy="60" r="4" fill="#6B7280"/>
  <!-- Brake pad left -->
  <rect x="14" y="44" width="18" height="32" rx="4" fill="#DC2626"/>
  <rect x="14" y="44" width="18" height="32" rx="4" fill="url(#padGrad)"/>
  <!-- Pad friction material -->
  <rect x="16" y="48" width="14" height="24" rx="2" fill="#991B1B"/>
  <!-- Pad lines -->
  <line x1="19" y1="52" x2="27" y2="52" stroke="#7F1D1D" stroke-width="1.5"/>
  <line x1="19" y1="57" x2="27" y2="57" stroke="#7F1D1D" stroke-width="1.5"/>
  <line x1="19" y1="62" x2="27" y2="62" stroke="#7F1D1D" stroke-width="1.5"/>
  <line x1="19" y1="67" x2="27" y2="67" stroke="#7F1D1D" stroke-width="1.5"/>
  <!-- Brake pad right -->
  <rect x="88" y="44" width="18" height="32" rx="4" fill="#DC2626"/>
  <rect x="88" y="44" width="18" height="32" rx="4" fill="url(#padGrad2)"/>
  <rect x="90" y="48" width="14" height="24" rx="2" fill="#991B1B"/>
  <line x1="93" y1="52" x2="101" y2="52" stroke="#7F1D1D" stroke-width="1.5"/>
  <line x1="93" y1="57" x2="101" y2="57" stroke="#7F1D1D" stroke-width="1.5"/>
  <line x1="93" y1="62" x2="101" y2="62" stroke="#7F1D1D" stroke-width="1.5"/>
  <line x1="93" y1="67" x2="101" y2="67" stroke="#7F1D1D" stroke-width="1.5"/>
  <defs>
    <linearGradient id="padGrad" x1="14" y1="44" x2="32" y2="76" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EF4444"/>
      <stop offset="1" stop-color="#B91C1C"/>
    </linearGradient>
    <linearGradient id="padGrad2" x1="88" y1="44" x2="106" y2="76" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EF4444"/>
      <stop offset="1" stop-color="#B91C1C"/>
    </linearGradient>
  </defs>
</svg>
