<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <rect width="120" height="120" rx="16" fill="#F0FDF4"/>
  <!-- Filter cylinder -->
  <rect x="34" y="30" width="52" height="64" rx="10" fill="url(#filterGrad)"/>
  <!-- Top cap -->
  <rect x="30" y="26" width="60" height="16" rx="8" fill="#16A34A"/>
  <!-- Thread on top -->
  <circle cx="60" cy="26" r="8" fill="#15803D"/>
  <circle cx="60" cy="26" r="5" fill="#166534"/>
  <!-- Filter ribs/lines -->
  <rect x="34" y="50" width="52" height="3" rx="1.5" fill="#16A34A" opacity="0.4"/>
  <rect x="34" y="58" width="52" height="3" rx="1.5" fill="#16A34A" opacity="0.4"/>
  <rect x="34" y="66" width="52" height="3" rx="1.5" fill="#16A34A" opacity="0.4"/>
  <rect x="34" y="74" width="52" height="3" rx="1.5" fill="#16A34A" opacity="0.4"/>
  <!-- Brand stripe -->
  <rect x="34" y="42" width="52" height="14" rx="0" fill="white" opacity="0.15"/>
  <!-- Bottom cap -->
  <rect x="30" y="86" width="60" height="10" rx="5" fill="#15803D"/>
  <!-- Shine -->
  <rect x="36" y="32" width="10" height="56" rx="5" fill="white" opacity="0.08"/>
  <defs>
    <linearGradient id="filterGrad" x1="34" y1="30" x2="86" y2="94" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22C55E"/>
      <stop offset="1" stop-color="#15803D"/>
    </linearGradient>
  </defs>
</svg>
