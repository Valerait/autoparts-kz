<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <rect width="120" height="120" rx="16" fill="#F5F3FF"/>
  <!-- Mounting eye top -->
  <circle cx="60" cy="16" r="8" stroke="#7C3AED" stroke-width="3" fill="none"/>
  <circle cx="60" cy="16" r="3" fill="#7C3AED"/>
  <!-- Shaft rod (inner, chrome) -->
  <rect x="56" y="22" width="8" height="40" rx="2" fill="url(#shaftGrad)"/>
  <!-- Shaft shine -->
  <rect x="57" y="24" width="2" height="36" rx="1" fill="white" opacity="0.6"/>
  <!-- Dust boot / gaiter -->
  <path d="M50 52 Q60 58 70 52 L72 72 Q60 78 48 72 Z" fill="#8B5CF6" opacity="0.3"/>
  <path d="M50 57 Q60 63 70 57" stroke="#7C3AED" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M49 62 Q60 68 71 62" stroke="#7C3AED" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M49 67 Q60 73 71 67" stroke="#7C3AED" stroke-width="1" fill="none" opacity="0.5"/>
  <!-- Cylinder body -->
  <rect x="46" y="68" width="28" height="34" rx="6" fill="url(#cylGrad)"/>
  <!-- Cylinder shine -->
  <rect x="48" y="70" width="6" height="30" rx="3" fill="white" opacity="0.1"/>
  <!-- Brand band -->
  <rect x="46" y="78" width="28" height="10" rx="0" fill="#6D28D9" opacity="0.3"/>
  <!-- Mounting eye bottom -->
  <circle cx="60" cy="110" r="8" stroke="#7C3AED" stroke-width="3" fill="none"/>
  <circle cx="60" cy="110" r="3" fill="#7C3AED"/>
  <rect x="56" y="100" width="8" height="12" rx="0" fill="#7C3AED"/>
  <defs>
    <linearGradient id="shaftGrad" x1="56" y1="22" x2="64" y2="62" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E5E7EB"/>
      <stop offset="0.5" stop-color="#F9FAFB"/>
      <stop offset="1" stop-color="#D1D5DB"/>
    </linearGradient>
    <linearGradient id="cylGrad" x1="46" y1="68" x2="74" y2="102" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#5B21B6"/>
    </linearGradient>
  </defs>
</svg>
