<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <rect width="120" height="120" rx="16" fill="#EFF6FF"/>
  <!-- Wiper arm -->
  <rect x="54" y="14" width="8" height="16" rx="4" fill="#374151"/>
  <!-- Pivot point -->
  <circle cx="58" cy="22" r="6" fill="#1F2937"/>
  <circle cx="58" cy="22" r="3" fill="#6B7280"/>
  <!-- Wiper arm extending at angle -->
  <rect x="55" y="26" width="5" height="34" rx="2.5" transform="rotate(-10 55 26)" fill="#4B5563"/>
  <!-- Wiper blade assembly -->
  <rect x="22" y="58" width="76" height="8" rx="4" fill="#1F2937"/>
  <rect x="22" y="58" width="76" height="8" rx="4" fill="url(#wiperGrad)"/>
  <!-- Blade rubber -->
  <rect x="20" y="64" width="80" height="5" rx="2.5" fill="#111827"/>
  <!-- Support structure -->
  <rect x="44" y="54" width="4" height="10" rx="1" fill="#374151"/>
  <rect x="72" y="54" width="4" height="10" rx="1" fill="#374151"/>
  <!-- Water droplets -->
  <ellipse cx="38" cy="80" rx="3" ry="4" fill="#93C5FD" opacity="0.7"/>
  <ellipse cx="60" cy="86" rx="2.5" ry="3.5" fill="#60A5FA" opacity="0.6"/>
  <ellipse cx="82" cy="80" rx="3" ry="4" fill="#93C5FD" opacity="0.7"/>
  <ellipse cx="48" cy="92" rx="2" ry="3" fill="#BFDBFE" opacity="0.5"/>
  <ellipse cx="72" cy="90" rx="2" ry="3" fill="#BFDBFE" opacity="0.5"/>
  <!-- Arc sweep line (faint) -->
  <path d="M18 62 Q60 20 102 62" stroke="#BFDBFE" stroke-width="1.5" fill="none" stroke-dasharray="4 4"/>
  <defs>
    <linearGradient id="wiperGrad" x1="22" y1="58" x2="98" y2="66" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6B7280"/>
      <stop offset="1" stop-color="#374151"/>
    </linearGradient>
  </defs>
</svg>
